# Publish an ad-hoc signed ZoneLaunch.app zip on each version tag.
# No Apple Developer Program membership required.
name: Release ZoneLaunch

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and upload macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging version $VERSION (tag $TAG)"

      - name: Swift tests
        working-directory: macos/AppTimezoneLauncher
        run: swift test

      - name: Build regression scripts
        working-directory: macos/AppTimezoneLauncher
        run: |
          ./scripts/test-build-app.sh
          ./scripts/test-install-app.sh

      - name: Package release zip
        env:
          APP_BUILD: ${{ github.run_number }}
        run: |
          ./macos/AppTimezoneLauncher/scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZoneLaunch ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/ZoneLaunch-${{ steps.version.outputs.version }}-macos.zip
            dist/SHA256SUMS
          body: |
            ## ZoneLaunch ${{ steps.version.outputs.version }}

            Prebuilt **macOS app** (ad-hoc signed). No paid Apple Developer account is used for this pipeline.

            ### Download
            - `ZoneLaunch-${{ steps.version.outputs.version }}-macos.zip` — contains `ZoneLaunch.app` + `README-FIRST.txt`
            - `SHA256SUMS` — checksum

            ### Install
            1. Unzip, drag **ZoneLaunch.app** to Applications.
            2. First launch: if Gatekeeper blocks it, **right-click → Open → Open**.
            3. Details: [Install from Releases](https://github.com/jawQ/app-timezone-launchers/blob/master/docs/app/install-from-release.md)

            ### Shell launchers (lighter default)
            Most users only need the scripts:

            ```bash
            git clone https://github.com/jawQ/app-timezone-launchers.git
            cd app-timezone-launchers
            ./install.sh --feishu --wechat
            ```

            ### Identity
            Bundle ID: `app.zonelaunch.launcher`
